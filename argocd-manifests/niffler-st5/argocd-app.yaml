apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: niffler-st5
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pggorbachev/niffler-st5.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: niffler-st5
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true